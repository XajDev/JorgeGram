body.xp-olive .nav b{color:#4a5a2a}

<div class="theme-bar">
  Theme:
  <span class="on" onclick="setTheme('xp-blue',this)">XP Blue</span>
  <span onclick="setTheme('xp-silver',this)">XP Silver</span>
  <span onclick="setTheme('xp-olive',this)">XP Olive</span>
  <span onclick="setTheme('dark',this)">Dark</span>
</div>
<script>
function setTheme(t,el){document.body.className=t;localStorage.setItem('jorge-theme',t);var s=el.parentNode.getElementsByTagName('span');for(var i=0;i<s.length;i++)s[i].className='';el.className='on'}
var saved=localStorage.getItem('jorge-theme');if(saved)document.body.className=saved;
window.onload=function(){var t=document.body.className||'xp-blue';var spans=document.querySelectorAll('.theme-bar span');for(var i=0;i<spans.length;i++){spans[i].className='';if(spans[i].textContent.toLowerCase().replace(/ /g,'-').replace('xp-','xp-')===t||
(t==='xp-blue'&&spans[i].textContent==='XP Blue')||(t==='xp-silver'&&spans[i].textContent==='XP Silver')||(t==='xp-olive'&&spans[i].textContent==='XP Olive')||(t==='dark'&&spans[i].textContent==='Dark'))spans[i].className='on'}}
</script>
